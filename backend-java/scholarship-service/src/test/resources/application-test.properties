spring.application.name=scholarship-service

# In tests, use in-memory DB to avoid local MySQL dependency
spring.datasource.url=jdbc:h2:mem:scholarship_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Keep security noise down in tests
logging.level.org.springframework.security=INFO

