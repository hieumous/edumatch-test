name: qa-scholarship-regression

on:
  workflow_dispatch:

jobs:
  scholarship-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      JIRA_ISSUE_KEY: EDUMATCH-58
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start module dependencies
        run: |
          docker compose up -d auth-db scholarship-db rabbitmq
          docker compose ps

      - name: Wait for databases readiness
        run: |
          set -e
          for i in $(seq 1 60); do
            auth_db=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' auth-db-test 2>/dev/null || true)
            schol_db=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' scholarship-db-test 2>/dev/null || true)
            echo "db: try=$i auth-db=$auth_db scholarship-db=$schol_db"
            if [ "$auth_db" = "healthy" ] && [ "$schol_db" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          docker compose logs --no-color --tail=200 auth-db scholarship-db || true
          exit 1

      - name: Start module services
        run: |
          docker compose up -d --build auth-service scholarship-service
          docker compose ps

      - name: Wait for module readiness
        run: |
          set -e
          for i in $(seq 1 90); do
            auth_code=$(curl --max-time 3 -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin123"}' \
              "http://localhost:8081/api/auth/signin" || true)
            schol_code=$(curl --max-time 2 -s -o /dev/null -w "%{http_code}" \
              "http://localhost:8082/debug/health" || true)
            echo "try=$i auth=$auth_code scholarship=$schol_code"
            if [ "$auth_code" = "200" ] && [ "$schol_code" = "200" ]; then exit 0; fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color --tail=200 auth-service scholarship-service || true
          exit 1

      - name: Install Newman
        run: npm install --no-fund --no-audit --global newman@latest

      - name: Run scholarship/application regression
        run: |
          mkdir -p qa/reports/newman
          newman run "qa/postman/EduMatch.full.regression.postman_collection.json" \
            -e "qa/postman/Edumatch.scholarship.local.postman_environment.json" \
            --folder "Register" \
            --folder "Applicant Login" \
            --folder "Login" \
            --folder "Admin Create Employer" \
            --folder "Employer Login" \
            --folder "Refresh Token" \
            --folder "Verify Token" \
            --folder "Get Me (Auth)" \
            --folder "User" \
            --folder "Scholarships & Opportunities" \
            --folder "Applications" \
            --reporters cli,junit \
            --reporter-junit-export "qa/reports/newman/scholarship-junit.xml"

      - name: Comment result to Jira
        if: always()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node "qa/scripts/jira_comment_from_junit.mjs" "qa/reports/newman/scholarship-junit.xml"

      - name: Upload scholarship artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-scholarship-report
          path: qa/reports/newman/scholarship-junit.xml

      - name: Tear down
        if: always()
        run: docker compose down -v
