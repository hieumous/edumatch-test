name: qa-matching-regression

on:
  workflow_dispatch:

jobs:
  matching-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      JIRA_ISSUE_KEY: EDUMATCH-58
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start matching stack
        run: |
          docker compose up -d --build \
            auth-db matching-db rabbitmq \
            auth-service matching-service
          docker compose ps

      - name: Wait for module readiness
        run: |
          set -e
          for i in $(seq 1 90); do
            auth_code=$(curl --max-time 3 -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin123"}' \
              "http://localhost:8081/api/auth/signin" || true)
            match_code=$(curl --max-time 2 -s -o /dev/null -w "%{http_code}" \
              "http://localhost:8000/health" || true)
            echo "try=$i auth=$auth_code matching=$match_code"
            if [ "$auth_code" = "200" ] && [ "$match_code" = "200" ]; then exit 0; fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color --tail=200 auth-service matching-service || true
          exit 1

      - name: Install Newman
        run: npm install --no-fund --no-audit --global newman@latest

      - name: Run matching regression
        run: |
          mkdir -p qa/reports/newman
          newman run "qa/postman/EduMatch.full.regression.postman_collection.json" \
            -e "qa/postman/Edumatch.matching.local.postman_environment.json" \
            --folder "Auth" \
            --folder "Matching" \
            --reporters cli,junit \
            --reporter-junit-export "qa/reports/newman/matching-junit.xml"

      - name: Comment result to Jira
        if: always()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node "qa/scripts/jira_comment_from_junit.mjs" "qa/reports/newman/matching-junit.xml"

      - name: Upload matching artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-matching-report
          path: qa/reports/newman/matching-junit.xml

      - name: Tear down
        if: always()
        run: docker compose down -v
