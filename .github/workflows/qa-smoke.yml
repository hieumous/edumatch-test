name: qa-smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  postman-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Target issue to write results to (not a secret).
      JIRA_ISSUE_KEY: EADUMATCH-58
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start Docker stack (minimal)
        run: |
          docker compose up -d --build \
            auth-db scholarship-db matching-db rabbitmq \
            auth-service scholarship-service matching-service
          docker compose ps

      - name: Wait for API readiness
        run: |
          set -e
          curl_code () {
            curl --max-time 2 -s -o /dev/null -w "%{http_code}" "$1" || true
          }

          echo "Waiting for auth-service health..."
          for i in $(seq 1 90); do
            code=$(curl_code "http://localhost:8081/actuator/health")
            echo "auth/health: try=$i code=$code"
            if [ "$code" = "200" ]; then break; fi
            if [ $((i % 15)) -eq 0 ]; then docker compose ps; fi
            sleep 2
          done

          code=$(curl_code "http://localhost:8081/actuator/health")
          if [ "$code" != "200" ]; then
            echo "Auth service not ready."
            docker compose ps
            docker compose logs --no-color --tail=200 auth-service || true
            exit 1
          fi

          echo "Waiting for auth API (/api/auth/verify should return 401 when up)..."
          for i in $(seq 1 90); do
            code=$(curl_code "http://localhost:8081/api/auth/verify")
            echo "api/auth/verify: try=$i code=$code"
            if [ "$code" = "401" ] || [ "$code" = "200" ]; then break; fi
            if [ $((i % 15)) -eq 0 ]; then docker compose ps; fi
            sleep 2
          done

          echo "Waiting for scholarship public endpoint..."
          for i in $(seq 1 90); do
            code=$(curl_code "http://localhost:8082/api/scholarships?page=0&size=1")
            echo "api/scholarships: try=$i code=$code"
            if [ "$code" = "200" ]; then exit 0; fi
            if [ $((i % 15)) -eq 0 ]; then docker compose ps; fi
            sleep 2
          done
          echo "Services not ready in time."
          docker compose ps
          docker compose logs --no-color --tail=200 auth-service scholarship-service matching-service || true
          exit 1

      - name: Install Newman
        run: npm install --no-fund --no-audit --global newman@latest

      - name: Run smoke collection
        run: |
          mkdir -p qa/reports/newman
          newman run "qa/postman/EduMatch.local.smoke.postman_collection.json" \
            -e "qa/postman/Edumatch.local.postman_environment.json" \
            --reporters cli,junit \
            --reporter-junit-export "qa/reports/newman/junit.xml"

      - name: Comment result to Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        if: always() && env.JIRA_API_TOKEN != '' && env.JIRA_EMAIL != '' && env.JIRA_BASE_URL != ''
        run: node "qa/scripts/jira_comment_from_junit.mjs" "qa/reports/newman/junit.xml"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-smoke-report
          path: qa/reports/newman

      - name: Tear down Docker stack
        if: always()
        run: docker compose down -v

