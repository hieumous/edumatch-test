name: qa-auth-regression

on:
  workflow_dispatch:

jobs:
  auth-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      JIRA_ISSUE_KEY: EDUMATCH-61
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start auth dependencies
        run: |
          docker compose up -d auth-db rabbitmq
          docker compose ps

      - name: Wait for auth-db readiness
        run: |
          set -e
          for i in $(seq 1 60); do
            state=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' auth-db-test 2>/dev/null || true)
            echo "auth-db: try=$i state=$state"
            if [ "$state" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          docker compose logs --no-color --tail=200 auth-db || true
          exit 1

      - name: Start auth service
        run: |
          docker compose up -d --build auth-service
          docker compose ps

      - name: Wait for auth login readiness
        run: |
          set -e
          for i in $(seq 1 90); do
            code=$(curl --max-time 3 -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin123"}' \
              "http://localhost:8081/api/auth/signin" || true)
            echo "auth/signin: try=$i code=$code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color --tail=200 auth-db || true
          docker compose logs --no-color --tail=200 auth-service || true
          exit 1

      - name: Install Newman
        run: npm install --no-fund --no-audit --global newman@latest

      - name: Run auth regression
        run: |
          mkdir -p qa/reports/newman
          newman run "qa/postman/EduMatch.auth.regression.postman_collection.json" \
            -e "qa/postman/Edumatch.auth.local.postman_environment.json" \
            --reporters cli,junit \
            --reporter-junit-export "qa/reports/newman/auth-junit.xml"

      - name: Comment result to Jira
        if: always()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node "qa/scripts/jira_comment_from_junit.mjs" "qa/reports/newman/auth-junit.xml"

      - name: Upload auth artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-auth-report
          path: qa/reports/newman/auth-junit.xml

      - name: Tear down
        if: always()
        run: docker compose down -v
