services:
  chat-service:
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://chat-db:3306/chat_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      APP_JWT_SECRET: EduMatch_Super_Secret_Key_!@#_DoNotShare_!@#
      APP_FIREBASE_SDK_PATH: classpath:firebase-adminsdk-key.json
      SPRING_APPLICATION_JSON: >
        {"app":{"services":{"auth-service":{"url":"http://auth-service:8081"}}}}
